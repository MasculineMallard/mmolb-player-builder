<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Element Picker — MMOLB Builder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    padding: 20px 28px 60px;
    line-height: 1.5;
  }

  h1 { color: #f0f6fc; font-size: 20px; margin-bottom: 2px; }
  .subtitle { color: #8b949e; font-size: 12px; margin-bottom: 20px; }

  .element-group {
    margin-bottom: 28px;
    border: 1px solid #21262d;
    border-radius: 8px;
    overflow: hidden;
  }
  .element-header {
    background: #161b22;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #21262d;
    cursor: pointer;
    user-select: none;
  }
  .element-header:hover { background: #1c2129; }
  .element-title {
    font-size: 14px;
    font-weight: 600;
    color: #f0f6fc;
  }
  .element-number {
    font-size: 11px;
    font-weight: 700;
    color: #3b82f6;
    background: rgba(59,130,246,0.15);
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 8px;
  }
  .element-data {
    font-size: 11px;
    color: #8b949e;
    margin-left: auto;
    margin-right: 12px;
  }
  .selected-label {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 3px;
    transition: all 0.2s;
  }
  .selected-label.none { background: rgba(139,148,158,0.15); color: #8b949e; }
  .selected-label.picked { background: rgba(59,130,246,0.2); color: #58a6ff; }
  .chevron {
    color: #8b949e;
    transition: transform 0.2s;
    font-size: 12px;
    margin-left: 8px;
  }
  .chevron.open { transform: rotate(180deg); }

  .element-body {
    display: none;
    background: #0d1117;
  }
  .element-body.open { display: block; }

  .notes-area {
    padding: 8px 14px;
    background: #0d1117;
    border-top: 1px solid #21262d;
  }
  .notes-area textarea {
    width: 100%;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 4px;
    color: #c9d1d9;
    font-family: inherit;
    font-size: 11px;
    padding: 6px 8px;
    resize: vertical;
    min-height: 32px;
    max-height: 120px;
    line-height: 1.4;
  }
  .notes-area textarea::placeholder { color: #484f58; }
  .notes-area textarea:focus { outline: none; border-color: #58a6ff; }
  .notes-label { font-size: 10px; color: #484f58; margin-bottom: 3px; }

  .option-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 0;
    border-bottom: 1px solid #21262d;
  }
  .option-row:last-child { border-bottom: none; }

  .option {
    padding: 12px 14px;
    border-right: 1px solid #21262d;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .option:last-child { border-right: none; }
  .option:hover { background: #161b22; }
  .option.selected { background: rgba(59,130,246,0.08); }
  .option.selected::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: #3b82f6;
  }

  .option-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .option-label .tag {
    font-size: 9px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 3px;
    text-transform: uppercase;
  }
  .tag.current { background: rgba(63,185,80,0.15); color: #3fb950; }
  .tag.new { background: rgba(59,130,246,0.15); color: #58a6ff; }

  .option-desc {
    font-size: 11px;
    color: #8b949e;
    line-height: 1.4;
    margin-bottom: 8px;
  }

  /* Mockup area */
  .mockup {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px;
    min-height: 60px;
  }

  /* ── Scale colors ── */
  :root {
    --scale-bad: #E8A735;
    --scale-poor: #D4A843;
    --scale-mid: #8B949E;
    --scale-good: #60A5FA;
    --scale-great: #3B82F6;
  }

  /* ── Summary bar ── */
  .summary-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #161b22;
    border-top: 1px solid #30363d;
    padding: 10px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    gap: 12px;
  }
  .summary-counts { font-size: 12px; color: #8b949e; }
  .summary-counts strong { color: #f0f6fc; }
  .copy-btn {
    background: linear-gradient(180deg, #4B8DF7 0%, #3B82F6 100%);
    color: white;
    border: none;
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .copy-btn:hover { filter: brightness(1.1); }

  /* Mini-chart helpers */
  .bar-track { height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .stat-val { font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 12px; font-weight: 600; }
  .stat-name { font-size: 11px; color: #8b949e; text-transform: capitalize; }
  .stat-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
  .cat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: #484f58; font-weight: 600; }

  /* Heatmap cell */
  .heat-cell {
    width: 28px; height: 22px; border-radius: 3px; display: flex; align-items: center; justify-content: center;
    font-family: monospace; font-size: 9px; font-weight: 600; color: #0d1117;
  }

  /* Radial gauge */
  .gauge { position: relative; width: 36px; height: 36px; }
  .gauge svg { width: 36px; height: 36px; }
  .gauge-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #c9d1d9; }

  /* Tag pill */
  .pill { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 500; }
  .pill-pri { background: rgba(59,130,246,0.15); color: #58a6ff; }
  .pill-sec { background: rgba(139,148,158,0.15); color: #8b949e; }
  .pill-boon { background: rgba(255,215,0,0.15); color: #e3b341; border: 1px solid rgba(255,215,0,0.25); }

  /* Progress ring segments */
  .ring-segment { fill: none; stroke-linecap: round; }

  /* Tiny sparkline */
  .sparkline { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>

<h1>Element Picker</h1>
<p class="subtitle">20 UI elements, 3 versions each + "None" option. Click to select. Current implementation is marked as the default.<br>
After all elements are decided, we move to arranging them on screen.</p>

<div id="elements"></div>

<div class="summary-bar">
  <div class="summary-counts">
    <strong id="picked-count">0</strong> of 20 elements decided
  </div>
  <div style="display:flex;gap:8px;">
    <button class="copy-btn" onclick="copySelections()" id="copy-btn">Copy Selections</button>
  </div>
</div>

<script>
// ── Color scale ──
function statColor(v) {
  if (v >= 500) return '#3B82F6';
  if (v >= 350) return '#60A5FA';
  if (v >= 200) return '#8B949E';
  if (v >= 80)  return '#D4A843';
  return '#E8A735';
}

// ── Sample data ──
const sampleStats = {
  batting: { contact: 380, discipline: 290, muscle: 450, lift: 320, aiming: 410, insight: 260, vision: 340, intimidation: 180, cunning: 220, determination: 390, wisdom: 310, selflessness: 150 },
  defense: { acrobatics: 280, agility: 340, arm: 310, awareness: 290, composure: 260, dexterity: 370, patience: 220, reaction: 350 },
  baserunning: { speed: 420, stealth: 280, greed: 190, performance: 360 },
  luck: { luck: 270 }
};
const allStats = {};
for (const [cat, stats] of Object.entries(sampleStats)) {
  for (const [k,v] of Object.entries(stats)) allStats[k] = v;
}

// ── SVG helpers ──
function arcPath(cx, cy, r, startAngle, endAngle) {
  const x1 = cx + r * Math.cos(startAngle);
  const y1 = cy + r * Math.sin(startAngle);
  const x2 = cx + r * Math.cos(endAngle);
  const y2 = cy + r * Math.sin(endAngle);
  const large = endAngle - startAngle > Math.PI ? 1 : 0;
  return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
}

function gaugeRing(value, max, color, size=36, stroke=4) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(value / max, 1);
  return `<div class="gauge" style="width:${size}px;height:${size}px;">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#21262d" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
        stroke-dasharray="${circ * pct} ${circ * (1-pct)}" stroke-linecap="round"
        transform="rotate(-90 ${size/2} ${size/2})"/>
    </svg>
    <div class="gauge-label" style="font-size:${size < 30 ? 8 : 9}px;">${value}</div>
  </div>`;
}

function miniBar(value, max, color, width=80, height=6) {
  const pct = Math.min(value / max * 100, 100);
  return `<div class="bar-track" style="width:${width}px;height:${height}px;">
    <div class="bar-fill" style="width:${pct}%;background:${color};"></div>
  </div>`;
}

function heatCell(value) {
  const c = statColor(value);
  return `<div class="heat-cell" style="background:${c};">${value}</div>`;
}

// ── Element definitions ──
const elements = [
  {
    id: 'player-identity',
    title: 'Player Identity',
    data: 'name, level, team, position, boons',
    options: [
      {
        label: 'A: Header Bar',
        tag: 'current',
        desc: 'Full-width card with name, level, team, position. Boons listed as pills below a divider.',
        mockup: () => `

            <span style="font-size:15px;font-weight:700;color:#f0f6fc;">Princess Solano</span>
            <span style="font-size:12px;color:#8b949e;">Lv.21</span>
            <span style="font-size:12px;color:#8b949e;">🏇 Lexington Lancers | RF</span>
          </div>
          <div style="height:1px;background:linear-gradient(to right,#30363d,transparent);margin-bottom:6px;"></div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;">
            <span class="pill pill-boon">🎯 Focused</span>
            <span class="pill pill-boon">💪 Strong</span>
            <span class="pill" style="background:rgba(255,215,0,0.15);color:#e3b341;border:1px solid rgba(255,215,0,0.3);font-weight:600;">✨ Grand Slam</span>
          </div>`
      },
      {
        label: 'B: Compact Inline',
        tag: 'new',
        desc: 'Single line. Name bold, level/team/position as subdued text. Boons as tiny dots or abbreviated.',
        mockup: () => `
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <span style="font-size:14px;font-weight:700;color:#f0f6fc;">Princess Solano</span>
            <span style="font-size:11px;color:#484f58;">21</span>
            <span style="font-size:11px;color:#484f58;">·</span>
            <span style="font-size:11px;color:#484f58;">🏇 Lexington Lancers</span>
            <span style="font-size:11px;color:#484f58;">·</span>
            <span style="font-size:11px;color:#484f58;">RF</span>
            <span style="font-size:11px;color:#484f58;">·</span>
            <span style="font-size:10px;color:#e3b341;">🎯💪✨</span>
          </div>`
      },
      {
        label: 'C: Badge Card',
        tag: 'new',
        desc: 'RPG-style badge: large level number left, name + team right, boons as a shimmer strip below.',
        mockup: () => `
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:44px;height:44px;border-radius:8px;background:linear-gradient(135deg,#3B82F6,#60A5FA);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:white;text-shadow:0 1px 3px rgba(0,0,0,0.3);">21</div>
            <div>
              <div style="font-size:15px;font-weight:700;color:#f0f6fc;">Princess Solano</div>
              <div style="font-size:11px;color:#8b949e;">🏇 Lexington Lancers · RF</div>
            </div>
          </div>
          <div style="margin-top:6px;display:flex;gap:4px;">
            <span class="pill pill-boon">🎯 Focused</span>
            <span class="pill pill-boon">💪 Strong</span>
            <span class="pill" style="background:rgba(255,215,0,0.15);color:#e3b341;border:1px solid rgba(255,215,0,0.3);font-weight:600;">✨ Grand Slam</span>
          </div>`
      }
    ]
  },
  {
    id: 'archetype-selector',
    title: 'Archetype Selector',
    data: 'archetype list, name, emoji, description, priority/secondary stats',
    options: [
      {
        label: 'A: Dropdown + Detail',
        tag: 'current',
        desc: 'Select dropdown, then shows priority stat pills and description below.',
        mockup: () => `
          <div style="margin-bottom:6px;">
            <select style="width:100%;background:#21262d;border:1px solid #30363d;border-radius:4px;padding:5px 8px;color:#c9d1d9;font-size:12px;">
              <option>⚡ Contact Specialist</option>
            </select>
          </div>
          <div style="display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap;">
            <span class="pill pill-pri">contact</span>
            <span class="pill pill-pri">discipline</span>
            <span class="pill pill-pri">aiming</span>
          </div>
          <div style="font-size:11px;color:#8b949e;">Prioritizes contact and plate discipline for consistent base hits.</div>`
      },
      {
        label: 'B: Dropdown Only',
        tag: 'new',
        desc: 'Just the dropdown, no detail panel. Saves vertical space. Stats are shown elsewhere.',
        mockup: () => `
          <select style="width:100%;background:#21262d;border:1px solid #30363d;border-radius:4px;padding:5px 8px;color:#c9d1d9;font-size:12px;">
            <option>⚡ Contact Specialist — contact, discipline, aiming</option>
          </select>`
      },
      {
        label: 'C: Pill Toggle Bar',
        tag: 'new',
        desc: 'Horizontal scrollable pill bar. Each archetype is a clickable pill. Selected one expands to show stats.',
        mockup: () => `
          <div style="display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;">
            <span style="font-size:11px;padding:4px 10px;border-radius:16px;background:rgba(59,130,246,0.2);color:#58a6ff;border:1px solid rgba(59,130,246,0.4);white-space:nowrap;cursor:pointer;font-weight:600;">⚡ Contact Specialist</span>
            <span style="font-size:11px;padding:4px 10px;border-radius:16px;background:#21262d;color:#8b949e;border:1px solid #30363d;white-space:nowrap;cursor:pointer;">🔥 Power Hitter</span>
            <span style="font-size:11px;padding:4px 10px;border-radius:16px;background:#21262d;color:#8b949e;border:1px solid #30363d;white-space:nowrap;cursor:pointer;">🎯 Balanced</span>
            <span style="font-size:11px;padding:4px 10px;border-radius:16px;background:#21262d;color:#8b949e;border:1px solid #30363d;white-space:nowrap;cursor:pointer;">🔧 Custom</span>
          </div>
          <div style="font-size:10px;color:#8b949e;margin-top:4px;">Core: <span style="color:#58a6ff;">contact, discipline, aiming</span></div>`
      }
    ]
  },
  {
    id: 'next-action',
    title: 'Next Level Action',
    data: 'next level #, what happens (stat points / boon / defense bonus), top recommendation',
    options: [
      {
        label: 'A: Action Card',
        tag: 'current',
        desc: 'Bordered card with "Next: Level 22", bold action text, and supporting detail.',
        mockup: () => `
          <div style="border:1px solid rgba(59,130,246,0.5);border-radius:6px;padding:8px 10px;">
            <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px;">
              <span style="color:#58a6ff;font-weight:600;">Next: Level 22</span>

            </div>
            <div style="font-size:13px;font-weight:700;color:#f0f6fc;">Put +50 into <span style="color:#58a6ff;">Contact</span></div>
            <div style="font-size:10px;color:#8b949e;">Currently 380 / 500 target. 120 points behind.</div>
          </div>`
      },
      {
        label: 'B: Inline Banner',
        tag: 'new',
        desc: 'Thin horizontal banner. Arrow icon, action text, level badge. One line.',
        mockup: () => `
          <div style="display:flex;align-items:center;gap:8px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.25);border-radius:4px;padding:5px 10px;">
            <span style="color:#3b82f6;font-size:14px;">→</span>
            <span style="font-size:12px;font-weight:600;color:#f0f6fc;">Lv.22: +50 <span style="text-transform:capitalize;color:#58a6ff;">contact</span></span>
            <span style="font-size:10px;color:#8b949e;margin-left:auto;">380→430 / 500 target</span>
          </div>`
      },
      {
        label: 'C: Pill + Tooltip',
        tag: 'new',
        desc: 'Tiny pill that says "Lv.22 → Contact +50". Hover/click for full detail. Minimal footprint.',
        mockup: () => `
          <div style="display:inline-flex;align-items:center;gap:4px;">
            <span style="font-size:11px;padding:3px 8px;border-radius:4px;background:rgba(59,130,246,0.15);color:#58a6ff;font-weight:600;cursor:help;">Lv.22 → Contact +50</span>
            <span style="font-size:9px;color:#484f58;">(hover for detail)</span>
          </div>`
      }
    ]
  },
  {
    id: 'stat-display',
    title: 'Stat Values Display',
    data: '25 stats (batter) grouped into 4-5 categories, each 0-1000',
    options: [
      {
        label: 'A: Table Rows',
        tag: 'current',
        desc: 'Category headers, then stat name + colored number per row. Compact text list.',
        mockup: () => {
          let html = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">';
          const cats = { 'BATTING': ['contact','discipline','muscle','lift'], 'DEFENSE': ['acrobatics','agility','arm','awareness'], 'BASERUNNING': ['speed','stealth','greed','performance'] };
          for (const [cat, stats] of Object.entries(cats)) {
            html += `<div><div class="cat-label" style="margin-bottom:3px;border-bottom:1px solid #21262d;padding-bottom:2px;">${cat}</div>`;

              html += `<div class="stat-row"><span class="stat-name" style="flex:1;">${s}</span><span class="stat-val" style="color:${statColor(v)};">${v}</span></div>`;

      },
      {
        label: 'B: Heatmap Grid',
        tag: 'new',
        desc: 'Stats as a grid of colored cells. Background color = quality tier. Compact, scannable at a glance.',
        mockup: () => {
          let html = '<div style="display:flex;flex-direction:column;gap:4px;">';
          const cats = { 'BAT': ['contact','discipline','muscle','lift','aiming','insight','vision','intimidation','cunning','determination','wisdom','selflessness'], 'DEF': ['acrobatics','agility','arm','awareness','composure','dexterity','patience','reaction'], 'RUN': ['speed','stealth','greed','performance'], 'LUCK': ['luck'] };
          for (const [cat, stats] of Object.entries(cats)) {
            html += `<div style="display:flex;align-items:center;gap:3px;"><span class="cat-label" style="width:28px;">${cat}</span>`;
            for (const s of stats) {
              const v = allStats[s] || 270;
              html += `<div class="heat-cell" title="${s}: ${v}" style="background:${statColor(v)};">${v}</div>`;
            }
            html += '</div>';
          }
          return html + '</div>';
        }
      },
      {
        label: 'C: Stat Bars',
        tag: 'new',
        desc: 'Each stat gets a horizontal bar (0-1000). Color encodes quality. Shows magnitude visually.',
        mockup: () => {
          let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;">';
          const stats = ['contact','discipline','muscle','lift','speed','acrobatics','agility','arm'];
          for (const s of stats) {
            const v = allStats[s];
            const c = statColor(v);
            html += `<div style="display:flex;align-items:center;gap:6px;">
              <span class="stat-name" style="width:70px;font-size:10px;">${s}</span>
              ${miniBar(v, 1000, c, 80, 5)}
              <span class="stat-val" style="color:${c};font-size:10px;width:28px;text-align:right;">${v}</span>
            </div>`;
          }
          return html + '</div><div style="font-size:9px;color:#484f58;margin-top:4px;">Showing 8 of 25 stats</div>';
        }
      }
    ]
  },
  {
    id: 'stat-highlight',
    title: 'Archetype Stat Highlighting',
    data: 'which stats are priority vs secondary for the chosen archetype',
    options: [
      {
        label: 'A: Background Tint',
        tag: 'current',
        desc: 'Priority/secondary stats get a blue tinted background and border in the stat list.',
        mockup: () => `
          <div style="display:flex;flex-direction:column;gap:2px;">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:3px 6px;border-radius:4px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);">
              <span class="stat-name">contact</span>
              <span class="stat-val" style="color:#60A5FA;">380</span>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;padding:3px 6px;border-radius:4px;">
              <span class="stat-name">muscle</span>

              <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,rgba(255,215,0,0.3),rgba(234,179,8,0.15));border:1.5px solid rgba(255,215,0,0.5);display:flex;align-items:center;justify-content:center;box-shadow:0 0 8px rgba(255,215,0,0.2);">
                <span style="font-size:16px;">🎯</span>
              </div>
              <div style="font-size:7px;color:#e3b341;text-align:center;margin-top:1px;">Lv.10</div>
            </div>
            <div style="width:20px;height:1px;background:linear-gradient(to right,rgba(255,215,0,0.3),rgba(255,215,0,0.1));"></div>
            <div style="position:relative;">
              <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,rgba(255,215,0,0.3),rgba(234,179,8,0.15));border:1.5px solid rgba(255,215,0,0.5);display:flex;align-items:center;justify-content:center;box-shadow:0 0 8px rgba(255,215,0,0.2);">
                <span style="font-size:16px;">💪</span>
              </div>
              <div style="font-size:7px;color:#e3b341;text-align:center;margin-top:1px;">Lv.20</div>
            </div>
            <div style="width:20px;height:1px;background:linear-gradient(to right,rgba(255,215,0,0.1),#21262d);"></div>
            <div style="position:relative;">
              <div style="width:36px;height:36px;border-radius:50%;background:#161b22;border:1.5px dashed #30363d;display:flex;align-items:center;justify-content:center;">
                <span style="font-size:10px;color:#484f58;">?</span>
              </div>
              <div style="font-size:7px;color:#484f58;text-align:center;margin-top:1px;">Lv.30</div>
            </div>
          </div>`
      },
      {
        label: 'C: Inline Gem Icons',
        tag: 'new',
        desc: 'Boons as gem-shaped icons in a compact row. Gold = acquired, blue outline = recommended. Fits in very tight space.',
        mockup: () => `
          <div style="display:flex;align-items:center;gap:3px;">
            <span style="font-size:9px;color:#484f58;margin-right:2px;">Boons:</span>
            <div style="width:22px;height:22px;background:linear-gradient(135deg,#EAB308,#F59E0B);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);display:flex;align-items:center;justify-content:center;">
              <span style="font-size:10px;">🎯</span>
            </div>
            <div style="width:22px;height:22px;background:linear-gradient(135deg,#EAB308,#F59E0B);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);display:flex;align-items:center;justify-content:center;">
              <span style="font-size:10px;">💪</span>
            </div>
            <div style="width:22px;height:22px;background:#21262d;border:1px dashed #484f58;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);display:flex;align-items:center;justify-content:center;">
              <span style="font-size:8px;color:#484f58;">?</span>
            </div>
            <span style="font-size:9px;color:#58a6ff;margin-left:4px;">Next: Lucky</span>
          </div>`
      }
    ]
  }
];

// ── Render ──
const selections = {};
const notes = {};
const container = document.getElementById('elements');

function render() {
  container.innerHTML = '';
  elements.forEach((el, ei) => {
    const sel = selections[el.id];
    const selLabel = sel === undefined ? 'Undecided' : sel === 'none' ? 'None' : sel.toUpperCase();
    const isDecided = sel !== undefined;

    const group = document.createElement('div');
    group.className = 'element-group';
    group.innerHTML = `
      <div class="element-header" onclick="toggleBody('${el.id}')">
        <div style="display:flex;align-items:center;">
          <span class="element-number">${ei + 1}</span>
          <span class="element-title">${el.title}</span>
        </div>
        <div style="display:flex;align-items:center;">
          <span class="element-data">${el.data}</span>
          <span class="selected-label ${isDecided ? 'picked' : 'none'}">${selLabel}</span>
          <span class="chevron" id="chev-${el.id}">▼</span>
        </div>
      </div>
      <div class="element-body" id="body-${el.id}">
        <div class="option-row">
          ${el.options.map((opt, oi) => {
            const letter = String.fromCharCode(97 + oi); // a, b, c
            const isSelected = sel === letter;
            return `
              <div class="option ${isSelected ? 'selected' : ''}" onclick="selectOption('${el.id}','${letter}')">
                <div class="option-label">
                  ${opt.label}
                  ${opt.tag === 'current' ? '<span class="tag current">DEFAULT</span>' : '<span class="tag new">NEW</span>'}
                </div>
                <div class="option-desc">${opt.desc}</div>
                <div class="mockup">${typeof opt.mockup === 'function' ? opt.mockup() : opt.mockup}</div>
              </div>`;
          }).join('')}
          <div class="option ${sel === 'none' ? 'selected' : ''}" onclick="selectOption('${el.id}','none')">
            <div class="option-label">None</div>
            <div class="option-desc">Remove this element entirely from the UI.</div>
            <div class="mockup" style="display:flex;align-items:center;justify-content:center;color:#484f58;font-size:12px;min-height:40px;">
              ∅ Not included
            </div>
          </div>
        </div>
      </div>
      <div class="notes-area" id="notes-area-${el.id}" style="display:${sel !== undefined ? 'block' : 'none'};">
        <div class="notes-label">Notes</div>
        <textarea
          id="notes-${el.id}"
          placeholder="Any notes on this choice..."
          oninput="saveNote('${el.id}', this.value)"
          onclick="event.stopPropagation()"
        >${notes[el.id] || ''}</textarea>
      </div>`;
    container.appendChild(group);
  });
  updateCount();
}

function toggleBody(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function selectOption(elementId, option) {
  selections[elementId] = option;
  render();
  // Re-open the one we just selected
  const body = document.getElementById('body-' + elementId);
  const chev = document.getElementById('chev-' + elementId);
  if (body) { body.classList.add('open'); chev.classList.add('open'); }
  // Show notes area
  const notesArea = document.getElementById('notes-area-' + elementId);
  if (notesArea) notesArea.style.display = 'block';
}

function saveNote(elementId, value) {
  notes[elementId] = value;
}

function updateCount() {
  const decided = Object.keys(selections).length;
  document.getElementById('picked-count').textContent = decided;
}

function copySelections() {
  const lines = elements.map(el => {
    const sel = selections[el.id];
    let line;
    if (sel === undefined) line = `${el.title}: UNDECIDED`;
    else if (sel === 'none') line = `${el.title}: NONE`;
    else {
      const opt = el.options[sel.charCodeAt(0) - 97];
      line = `${el.title}: ${opt.label}`;
    }
    const note = notes[el.id];
    if (note && note.trim()) line += `\n  Notes: ${note.trim()}`;
    return line;
  });
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Selections', 2000);
  });
}

render();
</script>
</body>
</html>
